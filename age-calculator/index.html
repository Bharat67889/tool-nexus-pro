    <link rel="icon" type="image/png" href="favicon.png">
    <meta charset="UTF-8">
    <title>Age Calculator - Apna Sahi Umar Check Karein</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .box { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 20px 0; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        button { background: #2563eb; color: white; border: none; padding: 15px 30px; border-radius: 10px; font-size: 18px; cursor: pointer; width: 100%; }
        #result { margin-top: 25px; font-size: 18px; line-height: 1.6; color: #1e293b; }
    </style>
</head>
<body>
    <div class="box">
        <h2>📅 Age Calculator</h2>
        <p>Apni Date of Birth select karein:</p>
        <input type="date" id="dob">
        <button onclick="calculateAge()">Calculate Age</button>
        <div id="result"></div>
    </div>

    <script>
        function calculateAge() {
            const dob = new Date(document.getElementById('dob').value);
            const now = new Date();
            if(!dob.getTime()) return alert("Sahi date dalo bhai!");
            
            let years = now.getFullYear() - dob.getFullYear();
            let months = now.getMonth() - dob.getMonth();
            let days = now.getDate() - dob.getDate();

            if (days < 0) {
                months--;
                days += new Date(now.getFullYear(), now.getMonth(), 0).getDate();
            }
            if (months < 0) {
                years--;
                months += 12;
            }
            document.getElementById('result').innerHTML = `Aapki umar <b>${years} saal, ${months} mahine</b> aur <b>${days} din</b> hai.`;
        }
    </script>
</body>
</html>
