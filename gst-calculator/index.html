<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GST Calculator India - Add or Remove GST Online</title>
    <style>
        :root { --primary: #059669; --bg: #f0fdf4; }
        body { font-family: sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 450px; }
        h2 { color: var(--primary); text-align: center; margin-top: 0; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input, select { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        button { padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .add-btn { background: var(--primary); color: white; }
        .remove-btn { background: #dc2626; color: white; }
        .result-box { margin-top: 20px; padding: 15px; background: #f8fafc; border-radius: 8px; display: none; border-left: 4px solid var(--primary); }
        .result-line { display: flex; justify-content: space-between; margin: 5px 0; font-size: 15px; }
    </style>
</head>
<body>

<div class="card">
    <h2>💰 GST Calculator</h2>
    <div class="input-group">
        <label>Amount (₹):</label>
        <input type="number" id="amount" placeholder="Enter Amount">
    </div>
    <div class="input-group">
        <label>GST Rate (%):</label>
        <select id="gstRate">
            <option value="5">5%</option>
            <option value="12">12%</option>
            <option value="18" selected>18%</option>
            <option value="28">28%</option>
        </select>
    </div>
    <div class="btn-group">
        <button class="add-btn" onclick="calculateGST(true)">Add GST</button>
        <button class="remove-btn" onclick="calculateGST(false)">Remove GST</button>
    </div>

    <div id="resultBox" class="result-box">
        <div class="result-line">Net Amount: <span id="netAmt"></span></div>
        <div class="result-line">GST Amount: <span id="gstAmt"></span></div>
        <div class="result-line"><strong>Total Amount: <span id="totalAmt"></span></strong></div>
    </div>
</div>

<script>
    function calculateGST(isAdd) {
        const amount = parseFloat(document.getElementById('amount').value);
        const rate = parseFloat(document.getElementById('gstRate').value);
        const resultBox = document.getElementById('resultBox');

        if (!amount || amount <= 0) {
            alert("Bhai, valid amount toh daal!");
            return;
        }

        let gst, total, net;
        if (isAdd) {
            gst = (amount * rate) / 100;
            total = amount + gst;
            net = amount;
        } else {
            total = amount;
            net = amount / (1 + (rate / 100));
            gst = total - net;
        }

        document.getElementById('netAmt').innerText = "₹" + net.toFixed(2);
        document.getElementById('gstAmt').innerText = "₹" + gst.toFixed(2);
        document.getElementById('totalAmt').innerText = "₹" + total.toFixed(2);
        resultBox.style.display = 'block';
    }
</script>

</body>
</html>
